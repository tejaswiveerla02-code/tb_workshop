<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderator - Gate Pass System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Moderator Panel</h1>
    <button onclick="loadRequests()">Load Requests</button>
    <div id="requests"></div>
  </div>

  <script>
    async function loadRequests() {
      const res = await fetch("http://localhost:3000/scan/all");
      const data = await res.json();
      const container = document.getElementById("requests");
      container.innerHTML = "";

      if (!data.requests || data.requests.length === 0) {
        container.innerHTML = "<p>No requests yet</p>";
        return;
      }

      data.requests.forEach(req => {
        const div = document.createElement("div");
        div.className = "request-card";
        div.innerHTML = `
          <p>🆔 <b>Student ID:</b> ${req.studentId}</p>
          <p>✏️ <b>Reason:</b> ${req.reason}</p>
          <p>📅 <b>Date:</b> ${req.date} ⏰ <b>Time:</b> ${req.time}</p>
          <p>📊 <b>Status:</b> ${req.status}</p>
          <textarea id="remarks-${req.id}" placeholder="Remarks...">${req.remarks}</textarea>
          <button onclick="updateStatus(${req.id}, 'approved')">✅ Approve</button>
          <button onclick="updateStatus(${req.id}, 'rejected')">❌ Reject</button>
        `;
        container.appendChild(div);
      });
    }

    async function updateStatus(id, status) {
      const remarks = document.getElementById(`remarks-${id}`).value;
      const res = await fetch("http://localhost:3000/moderate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, status, remarks })
      });
      const data = await res.json();
      alert(data.message);
      loadRequests();
    }
  </script>
</body>
</html>
